<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Первое открытие - Растущий Поток</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            margin: 0;
            padding: 16px;
            max-width: 430px;
            margin: 0 auto;
        }

        .header-container {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin: 10px 0 25px;
        }

        .back-btn {
            position: absolute; left: 0; top: 50%; transform: translateY(-50%);
            background: #334155; color: white; border: none; border-radius: 12px;
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; text-decoration: none;
        }

        .home-btn {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            background: #334155;
            color: white;
            border: none;
            border-radius: 12px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .home-btn:active {
            background: #475569;
            transform: translateY(-50%) scale(0.9);
        }

        h2 { margin: 0; font-size: 1.4rem; color: #c4d0ff; text-align: center; }

        .card {
            background: #1e2937; border-radius: 18px; padding: 20px;
            margin-bottom: 22px; width: 100%; box-sizing: border-box;
        }

        .deposit-label { display: block; margin-bottom: 10px; color: #94a3b8; font-size: 0.97rem; }
        
        .deposit-row { display: flex; gap: 8px; align-items: center; }

        .deposit-input {
            flex: 1; padding: 16px 14px; background: #334155;
            border: 2px solid #24a484; border-radius: 14px;
            color: white; font-size: 1.1rem; text-align: center; width: 184px;
        }

        .currency-select {
            flex: 1;
            padding: 16px 10px;
            background: #334155;
            border: 2px solid #24a484;
            border-radius: 14px;
            color: white;
            font-size: 1.1rem;
            text-align: center;
        }

        .note {
            font-size: 0.86rem;
            color: #64748b;
            margin-top: 10px;
        }

        .info {
            background: #1e2937; border-radius: 18px; padding: 15px;
            margin-bottom: 22px; text-align: center; line-height: 1.4;
        }

        table {
            width: 100%; border-collapse: collapse; background: #1e2937;
            font-size: 10px; border-radius: 14px; overflow: hidden; table-layout: fixed;
        }

        th, td { padding: 8px 2px; text-align: center; border-bottom: 1px solid #475569; }
        th { background: #334155; color: #c4d0ff; }

        .pct { color: #a5b4fc; }
        .vpotoke { color: #fbbf24; }
        .nach { color: #34d399; font-weight: bold; }
        .koshelek { color: #60a5fa; font-weight: bold; }

        .error { 
            color: #f87171; 
            font-size: 0.9rem; 
            margin-top: 8px; 
            text-align: center; 
            display: none; 
        }
    </style>
</head>
<body>

        <div class="header-container">
        <a href="growing.html" class="back-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
        </a>
        
        <h2>Первое Открытие РП</h2>

        <a href="index.html" class="home-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
        </a>
    </div>
    <div class="card">
        <label class="deposit-label">Сумма взноса</label>
        <div class="deposit-row">
            <input type="number" id="deposit" class="deposit-input" value="10000" oninput="calculateRP()">
            <select id="currency" class="currency-select" onchange="calculateRP()">
                <option value="RUB">RUB</option>
                <option value="USDT">USDT</option>
            </select>
        </div>
        <div class="note" id="limitNote">* от 1 000 до ∞</div>
        <div id="error" class="error"></div>
    </div>

    <div class="info" id="infoBlock">
        Бонус: <strong id="multiplierInfo">+100%</strong><br>
        Всего в потоке: <strong id="totalVpotoke" class="vpotoke">20 000.00</strong>
    </div>

    <table id="resultTable">
        <thead>
            <tr>
                <th style="width: 18%;">Дата</th>
                <th style="width: 8%;">Дни</th>
                <th style="width: 14%;">Процент</th>
                <th style="width: 20%;">В потоке</th>
                <th style="width: 20%;">Начисление</th>
                <th style="width: 20%;">Кошелек</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const limits = {
        RUB: { min: 1000, symbol: '₽' },
        USDT: { min: 100, symbol: '₮' }
    };

    // Функция форматирования чисел с пробелами и двумя знаками после запятой
    function formatNumber(num) {
        return num.toLocaleString('ru-RU', { 
            minimumFractionDigits: 2, 
            maximumFractionDigits: 2 
        });
    }

    function getMultiplier(currency, sum) {
        if (currency === 'USDT') {
            if (sum >= 1000000) return 3.8;
            if (sum >= 500000)  return 3.7;
            if (sum >= 250000)  return 3.6;
            if (sum >= 100000)  return 3.5;
            if (sum >= 50000)   return 3.3;
            if (sum >= 25000)   return 3.1;
            if (sum >= 10000)   return 3.0;
            if (sum >= 5000)    return 2.8;
            if (sum >= 2500)    return 2.6;
            if (sum >= 1000)    return 2.5;
            if (sum >= 500)     return 2.4;
            if (sum >= 100)     return 2.3;
            return 0;
        } else {
            if (sum >= 1000000) return 3;
            if (sum >= 500000)  return 2.75;
            if (sum >= 100000)  return 2.5;
            if (sum >= 50000)   return 2.25;
            if (sum >= 10000)   return 2;
            if (sum >= 5000)    return 1.75;
            if (sum >= 1000)    return 1.5;
            return 0;
        }
    }

    function getBonusText(mult) {
        const bonusPercent = Math.round((mult - 1) * 100);
        return `+${bonusPercent}%`;
    }

    function calculateRP() {
        const depositInput = document.getElementById('deposit');
        const currencySelect = document.getElementById('currency');
        let deposit = parseFloat(depositInput.value) || 0;
        const currency = currencySelect.value;
        const limit = limits[currency];
        
        const error = document.getElementById('error');
        const note = document.getElementById('limitNote');
        const tbody = document.getElementById('tableBody');
        const multInfo = document.getElementById('multiplierInfo');
        const totalInfo = document.getElementById('totalVpotoke');
        const infoBlock = document.getElementById('infoBlock');
        const table = document.getElementById('resultTable');
        
        note.textContent = `* от ${limit.min.toLocaleString('ru-RU')} до ∞ ${limit.symbol}`;
        tbody.innerHTML = '';

        if (deposit < limit.min) {
            error.style.display = 'block';
            error.textContent = `⚠ Сумма должна быть от ${limit.min.toLocaleString('ru-RU')} ${limit.symbol}`;
            infoBlock.style.display = 'none';
            table.style.display = 'none';
            return;
        } else {
            error.style.display = 'none';
        }

        const mult = getMultiplier(currency, deposit);
        if (mult === 0) {
            error.style.display = 'block';
            error.textContent = 'Сумма слишком мала для расчета';
            infoBlock.style.display = 'none';
            table.style.display = 'none';
            return;
        }

        // ВСЁ ВАЛИДНО — показываем
        infoBlock.style.display = 'block';
        table.style.display = 'table';

        let vPotoke = deposit * mult;
        let koshelek = 0;
        let currentDate = new Date();
        
        multInfo.textContent = getBonusText(mult);
        totalInfo.textContent = formatNumber(vPotoke);

        for (let day = 1; day <= 180; day++) {
            while (currentDate.getDay() === 0) {
                currentDate.setDate(currentDate.getDate() + 1);
            }

            let currentPercent = 0.1 + (day - 1) * 0.0033;
            let nachislenie = vPotoke * (currentPercent / 100);
            
            vPotoke -= nachislenie;
            koshelek += nachislenie;

            let dateStr = currentDate.toLocaleDateString('ru-RU', { 
                day: '2-digit', 
                month: '2-digit', 
                year: '2-digit' 
            });

            let row = document.createElement('tr');
            row.innerHTML = `
                <td>${dateStr}</td>
                <td>${day}</td>
                <td class="pct">${currentPercent.toFixed(4)}%</td>
                <td class="vpotoke">${formatNumber(vPotoke)}</td>
                <td class="nach">${formatNumber(nachislenie)}</td>
                <td class="koshelek">${formatNumber(koshelek)}</td>
            `;
            tbody.appendChild(row);

            currentDate.setDate(currentDate.getDate() + 1);
            if (vPotoke < 0.01) break;
        }
    }

    window.onload = () => {
        document.getElementById('infoBlock').style.display = 'none';
        document.getElementById('resultTable').style.display = 'none';
        calculateRP();
    };
</script>
</body>
</html>
