<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ПН Калькулятор</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            margin: 0;
            padding: 12px;
        }
        h1 { text-align: center; margin: 10px 0 20px; font-size: 1.5rem; }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            color: #94a3b8;
        }
        input, select {
            width: 100%;
            padding: 12px;
            background: #1e2937;
            border: 1px solid #475569;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: #1e2937;
            font-size: 14px;
        }
        th, td {
            border: 1px solid #334155;
            padding: 10px;
            text-align: center;
        }
        th {
            background: #334155;
            color: #c4d0ff;
        }
        .result { 
            font-weight: bold; 
            color: #34d399; 
        }
        .header {
            background: #1e40af;
            color: white;
            padding: 8px;
            text-align: center;
            border-radius: 8px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 Поток Начислений (ПН)</h1>

    <div class="header">Основные параметры</div>

    <div class="input-group">
        <label>Депозит (X) — от 2 000 до 200 000</label>
        <input type="number" id="deposit" value="50000" oninput="calculate()">
    </div>

    <div class="input-group">
        <label>Фиксированный % в день (по умолчанию 0.02)</label>
        <input type="number" id="dailyPercent" value="0.02" step="0.001" oninput="calculate()">
    </div>

    <div class="input-group">
        <label>Количество дней</label>
        <input type="number" id="days" value="30" oninput="calculate()">
    </div>

    <table id="resultTable">
        <thead>
            <tr>
                <th>День</th>
                <th>Дата (пример)</th>
                <th>В потоке</th>
                <th>Начисление за день</th>
                <th>Кошелёк (накоплено)</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <div style="margin-top:20px; text-align:center; font-size:1.1rem;">
        Итого начислено: <span id="totalAccrued" class="result">0</span>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    tg.setHeaderColor("#1e2937");

    function calculate() {
        const deposit = parseFloat(document.getElementById('deposit').value) || 0;
        const percent = parseFloat(document.getElementById('dailyPercent').value) || 0.02;
        const maxDays = parseInt(document.getElementById('days').value) || 30;

        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';

        let balance = deposit;
        let totalAccrued = 0;

        for (let day = 1; day <= maxDays; day++) {
            const dailyAccrual = balance * percent;
            totalAccrued += dailyAccrual;
            balance += dailyAccrual;

            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${day}</td>
                <td>День ${day}</td>
                <td>${balance.toFixed(2)}</td>
                <td class="result">+${dailyAccrual.toFixed(2)}</td>
                <td>${balance.toFixed(2)}</td>
            `;
            tbody.appendChild(row);
        }

        document.getElementById('totalAccrued').textContent = totalAccrued.toFixed(2) + ' ECR';
    }

    // Запуск при загрузке
    window.onload = () => {
        calculate();
    };
</script>
</body>
</html>
