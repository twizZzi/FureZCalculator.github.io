<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Крипто Курс</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .price { font-size: 2.5rem; font-weight: 700; }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">

<div class="max-w-md mx-auto p-4">
    <!-- Заголовок Telegram -->
    <div class="flex items-center justify-between mb-6">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-yellow-500 rounded-2xl flex items-center justify-center text-2xl">₿</div>
            <h1 class="text-2xl font-bold">Крипто Курс</h1>
        </div>
        <button onclick="toggleTheme()" class="text-gray-400 hover:text-white">
            🌗
        </button>
    </div>

    <!-- Выбор криптовалюты -->
    <div class="mb-6">
        <label class="block text-sm text-gray-400 mb-1">Криптовалюта</label>
        <select id="cryptoSelect" onchange="fetchPrices()" class="w-full bg-gray-800 text-white rounded-2xl px-4 py-3 focus:outline-none">
            <option value="bitcoin">Bitcoin (BTC)</option>
            <option value="ethereum">Ethereum (ETH)</option>
            <option value="solana">Solana (SOL)</option>
        </select>
    </div>

    <!-- Текущий курс -->
    <div class="bg-gray-800 rounded-3xl p-6 mb-8">
        <div class="flex justify-between items-baseline mb-2">
            <span class="text-gray-400">Текущий курс</span>
            <span id="lastUpdated" class="text-xs text-gray-500"></span>
        </div>
        <div id="priceDisplay" class="price text-emerald-400">—</div>
        <div id="priceChange" class="text-sm mt-1"></div>
    </div>

    <!-- Конвертер -->
    <div class="bg-gray-800 rounded-3xl p-6">
        <h2 class="text-lg font-semibold mb-4">Конвертер</h2>
        
        <div class="grid grid-cols-2 gap-4">
            <!-- Сумма крипты -->
            <div>
                <label class="block text-sm text-gray-400 mb-1">Сумма</label>
                <input id="amountInput" type="number" value="1" step="0.0001"
                       class="w-full bg-gray-700 text-white rounded-2xl px-4 py-3 focus:outline-none">
                <div id="cryptoSymbol" class="text-xs text-gray-400 mt-1 text-center">BTC</div>
            </div>

            <!-- Валюта -->
            <div>
                <label class="block text-sm text-gray-400 mb-1">Валюта</label>
                <select id="currencySelect" class="w-full bg-gray-700 text-white rounded-2xl px-4 py-3 focus:outline-none">
                    <option value="usd">USD ($)</option>
                    <option value="eur">EUR (€)</option>
                    <option value="rub" selected>RUB (₽)</option>
                    <option value="try">TRY (₺)</option>
                    <option value="cny">CNY (¥)</option>
                </select>
            </div>
        </div>

        <button onclick="convertCurrency()" 
                class="mt-6 w-full bg-emerald-500 hover:bg-emerald-600 transition py-4 rounded-3xl text-lg font-semibold">
            Конвертировать →
        </button>

        <div id="result" class="mt-6 text-center text-2xl font-bold text-emerald-400 min-h-[2.5rem]"></div>
    </div>

    <div class="text-center text-xs text-gray-500 mt-8">
        Обновляется автоматически каждые 30 сек • Данные CoinGecko
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    tg.setHeaderColor("#111827"); // тёмный заголовок

    let currentPrices = {};

    const cryptoIds = {
        bitcoin: "Bitcoin",
        ethereum: "Ethereum",
        solana: "Solana"
    };

    // Основной запрос к CoinGecko (бесплатно, без ключа)
    async function fetchPrices() {
        const crypto = document.getElementById('cryptoSelect').value;
        const vsCurrencies = 'usd,eur,rub,try,cny';

        try {
            const res = await fetch(
                `https://api.coingecko.com/api/v3/simple/price?ids=${crypto}&vs_currencies=${vsCurrencies}&include_24hr_change=true&include_last_updated_at=true`
            );
            const data = await res.json();
            currentPrices = data[crypto];

            // Обновляем отображение курса
            const selectedCurrency = document.getElementById('currencySelect').value;
            const price = currentPrices[selectedCurrency];
            const change = currentPrices[`${selectedCurrency}_24h_change`];

            document.getElementById('priceDisplay').textContent = 
                `${price.toLocaleString('ru-RU')} ${selectedCurrency.toUpperCase()}`;

            const changeEl = document.getElementById('priceChange');
            changeEl.innerHTML = change > 0 
                ? `<span class="text-emerald-400">▲ +${change.toFixed(2)}%</span>` 
                : `<span class="text-red-400">▼ ${change.toFixed(2)}%</span>`;

            document.getElementById('lastUpdated').textContent = 
                `Обновлено: ${new Date(currentPrices.last_updated_at * 1000).toLocaleTimeString('ru-RU')}`;

            document.getElementById('cryptoSymbol').textContent = cryptoIds[crypto];

        } catch (e) {
            console.error(e);
            document.getElementById('priceDisplay').textContent = 'Ошибка загрузки';
        }
    }

    // Конвертация
    function convertCurrency() {
        const amount = parseFloat(document.getElementById('amountInput').value) || 0;
        const crypto = document.getElementById('cryptoSelect').value;
        const targetCurrency = document.getElementById('currencySelect').value;
        
        if (!currentPrices[targetCurrency]) {
            document.getElementById('result').textContent = 'Сначала обновите курс';
            return;
        }

        const result = amount * currentPrices[targetCurrency];
        document.getElementById('result').innerHTML = `
            ${amount} ${cryptoIds[crypto]} = 
            <span class="text-3xl">${result.toLocaleString('ru-RU')}</span> 
            ${targetCurrency.toUpperCase()}
        `;
    }

    // Автоматическое обновление
    function startAutoUpdate() {
        fetchPrices();
        setInterval(fetchPrices, 30000); // каждые 30 секунд
    }

    // Переключение темы (на всякий случай)
    function toggleTheme() {
        if (document.documentElement.classList.contains('light')) {
            document.documentElement.classList.remove('light');
            tg.setHeaderColor("#111827");
        } else {
            document.documentElement.classList.add('light');
            tg.setHeaderColor("#f3f4f6");
        }
    }

    // Запуск
    window.onload = () => {
        startAutoUpdate();
        
        // При смене валюты сразу пересчитываем отображение
        document.getElementById('currencySelect').addEventListener('change', () => {
            if (Object.keys(currentPrices).length > 0) fetchPrices();
        });
    };
</script>
</body>
</html>
