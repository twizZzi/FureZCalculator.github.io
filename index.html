<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>FureZ Calculator</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            margin: 0;
            padding: 0;
        }
        .screen { 
            display: none; 
            min-height: 100vh; 
            padding: 16px; 
            max-width: 480px; 
            margin: 0 auto; 
        }
        .screen.active { display: block; }

        /* Главный экран */
        .main-screen h1 {
            text-align: center;
            font-size: 2.1rem;
            margin: 50px 0 60px;
            color: #a5b4fc;
        }
        .btn {
            width: 100%;
            padding: 18px;
            margin: 12px 0;
            border: none;
            border-radius: 16px;
            font-size: 1.15rem;
            font-weight: 600;
            color: white;
        }
        .btn-blue   { background: linear-gradient(135deg, #3b82f6, #1e40af); }
        .btn-yellow { background: linear-gradient(135deg, #fbbf24, #d97706); }
        .btn-green  { background: linear-gradient(135deg, #22c55e, #15803d); }
        .btn-red    { background: linear-gradient(135deg, #ef4444, #b91c1c); }

        /* Экран Потока Новичка */
        .table-screen h2 {
            text-align: center;
            margin: 10px 0 24px;
            font-size: 1.6rem;
        }
        .back-btn {
            background: #475569;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            margin-bottom: 20px;
        }

        .card {
            background: #1e2937;
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 20px;
        }

        /* Исправленная строка Депозит + Валюта */
        .deposit-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .deposit-input {
            flex: 1 1 auto;
            min-width: 0;                 /* важно для предотвращения вылезания */
            padding: 16px;
            background: #334155;
            border: 2px solid #3b82f6;
            border-radius: 12px;
            color: white;
            font-size: 1.22rem;
            text-align: center;
            box-sizing: border-box;
        }
        .deposit-input:focus {
            border-color: #60a5fa;
        }
        .deposit-input::-webkit-outer-spin-button,
        .deposit-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .currency-select {
            flex: 0 0 92px;               /* фиксированная ширина */
            padding: 16px 10px;
            background: #334155;
            border: 2px solid #3b82f6;
            border-radius: 12px;
            color: white;
            font-size: 1.05rem;
            text-align: center;
        }

        .deposit-label {
            display: block;
            margin-bottom: 8px;
            color: #94a3b8;
            font-size: 0.95rem;
        }
        .note {
            font-size: 0.85rem;
            color: #64748b;
            margin-top: 8px;
        }
        .error {
            color: #f87171;
            font-size: 0.9rem;
            margin-top: 10px;
            text-align: center;
            display: none;
        }

        .info {
            background: #334155;
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 0.97rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #1e2937;
            font-size: 14px;
            margin-top: 8px;
        }
        th, td {
            border: 1px solid #475569;
            padding: 11px 8px;
            text-align: center;
        }
        th { background: #334155; color: #c4d0ff; }
        .nach { color: #34d399; font-weight: bold; }
        .koshelek { color: #60a5fa; font-weight: bold; }
        .vpotoke { color: #fbbf24; font-weight: bold; }
    </style>
</head>
<body>

<div id="mainScreen" class="screen active main-screen">
    <h1>FureZ<br>Calculator</h1>
    <button class="btn btn-blue" onclick="showNoviceFlow()">Поток Новичка</button>
    <button class="btn btn-yellow" onclick="alert('Быстрый Поток скоро будет доступен')">Быстрый Поток</button>
    <button class="btn btn-green" onclick="alert('Растущий Поток скоро будет доступен')">Растущий Поток</button>
    <button class="btn btn-red" onclick="alert('Стартовый Поток скоро будет доступен')">Стартовый Поток</button>
</div>

<div id="noviceScreen" class="screen table-screen">
    <button class="back-btn" onclick="backToMain()">← Назад на главный экран</button>
    <h2>Поток Новичка (ПН)</h2>

    <div class="card">
        <label class="deposit-label">Депозит</label>
        <div class="deposit-row">
            <input type="number" id="deposit" class="deposit-input" value="100000" 
                   oninput="validateAndCalculate()">
            <select id="currency" class="currency-select" onchange="validateAndCalculate()">
                <option value="RUB">RUB
