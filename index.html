<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ПН - Калькулятор</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #111827; 
            color: #fff; 
            margin: 0; 
            padding: 0;
        }
        .container { padding: 16px; max-width: 100%; }
        h1 { text-align: center; margin: 10px 0 20px; }
        .upload-area {
            border: 2px dashed #4f46e5;
            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            background: #1f2937;
            margin-bottom: 20px;
            cursor: pointer;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #1f2937;
            font-size: 14px;
            overflow-x: auto;
            display: block;
        }
        th, td {
            border: 1px solid #374151;
            padding: 8px 10px;
            text-align: right;
            white-space: nowrap;
        }
        th {
            background: #374151;
            color: #a5b4fc;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .error { color: #f87171; text-align: center; margin: 20px; }
        .loading { text-align: center; color: #60a5fa; }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 Лист "ПН" — Поток Начислений</h1>

    <div id="uploadArea" class="upload-area">
        <p>Нажми здесь и выбери файл<br><strong>FureZ Calculator 6.0.xlsx</strong></p>
        <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none;">
    </div>

    <div id="loading" class="loading" style="display:none;">Загружаем таблицу...</div>
    <div id="tableContainer"></div>
    <div id="error" class="error" style="display:none;"></div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const fileInput = document.getElementById('fileInput');
    const uploadArea = document.getElementById('uploadArea');
    const tableContainer = document.getElementById('tableContainer');
    const loading = document.getElementById('loading');
    const errorDiv = document.getElementById('error');

    // Клик по области загрузки
    uploadArea.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        loading.style.display = 'block';
        errorDiv.style.display = 'none';
        tableContainer.innerHTML = '';

        const reader = new FileReader();
        reader.onload = function(event) {
            try {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, { type: 'array' });

                // Ищем лист с именем "ПН"
                const sheetName = workbook.SheetNames.find(name => name === 'ПН');
                if (!sheetName) {
                    throw new Error('Лист "ПН" не найден в файле!');
                }

                const worksheet = workbook.Sheets[sheetName];
                const html = XLSX.utils.sheet_to_html(worksheet, {
                    header: 1,
                    editable: false
                });

                tableContainer.innerHTML = html;
                loading.style.display = 'none';

                // Делаем таблицу прокручиваемой
                const table = tableContainer.querySelector('table');
                if (table) {
                    table.style.maxHeight = '70vh';
                    table.style.overflow = 'auto';
                }

            } catch (err) {
                loading.style.display = 'none';
                errorDiv.textContent = 'Ошибка: ' + err.message;
                errorDiv.style.display = 'block';
                console.error(err);
            }
        };

        reader.readAsArrayBuffer(file);
    });

    // Подсказка при открытии
    tg.showAlert("Загрузи свой файл FureZ Calculator 6.0.xlsx, чтобы увидеть лист «ПН»");
</script>
</body>
</html>
