<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ПН Калькулятор</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            margin: 0;
            padding: 12px;
        }
        h1 { 
            text-align: center; 
            margin: 10px 0 20px; 
            font-size: 1.6rem; 
        }
        .card {
            background: #1e2937;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            color: #94a3b8;
            font-size: 0.95rem;
        }
        input {
            width: 100%;
            padding: 14px;
            background: #334155;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
        }
        .info {
            background: #334155;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 16px;
            font-size: 1rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #1e2937;
            font-size: 14px;
        }
        th, td {
            border: 1px solid #475569;
            padding: 10px 8px;
            text-align: center;
        }
        th {
            background: #334155;
            color: #c4d0ff;
        }
        .nach { color: #34d399; font-weight: bold; }
        .koshelek { color: #60a5fa; font-weight: bold; }
        .vpotoke { color: #fbbf24; font-weight: bold; }
        .total {
            margin-top: 20px;
            font-size: 1.25rem;
            text-align: center;
            background: #1e2937;
            padding: 14px;
            border-radius: 12px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 Поток Начислений (ПН)</h1>

    <div class="card">
        <label>Депозит (X)</label>
        <input type="number" id="deposit" value="100000" oninput="calculate()">
    </div>

    <div class="info">
        Начальная сумма в потоке = Депозит + 50%<br>
        <strong id="vPotokeInfo">150 000.00</strong>
    </div>

    <table id="pnTable">
        <thead>
            <tr>
                <th>День</th>
                <th class="vpotoke">В потоке</th>
                <th class="nach">Начисление (0.2%)</th>
                <th class="koshelek">Кошелёк</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <div class="total">
        Итого в кошельке: <span id="totalKoshelek" class="koshelek">0.00</span> ECR
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    function calculate() {
        let deposit = parseFloat(document.getElementById('deposit').value) || 0;
        const percent = 0.002;        // 0.2%
        let maxDays = 180;            // можно изменить на любое количество дней

        // Начальная сумма в потоке = Депозит + 50%
        let vPotoke = deposit * 1.5;
        let koshelek = 0;

        // Обновляем информацию сверху
        document.getElementById('vPotokeInfo').textContent = vPotoke.toLocaleString('ru-RU', {minimumFractionDigits: 2});

        let tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';

        for (let day = 1; day <= maxDays; day++) {
            let nachislenie = vPotoke * percent;
            koshelek += nachislenie;
            vPotoke -= nachislenie;                     // уменьшаем поток

            let row = document.createElement('tr');
            row.innerHTML = `
                <td>${day}</td>
                <td class="vpotoke">${vPotoke.toFixed(2)}</td>
                <td class="nach">+${nachislenie.toFixed(2)}</td>
                <td class="koshelek">${koshelek.toFixed(2)}</td>
            `;
            tbody.appendChild(row);

            // Останавливаем, если поток стал очень маленьким
            if (vPotoke < 0.01) break;
        }

        document.getElementById('totalKoshelek').textContent = koshelek.toFixed(2);
    }

    // Автоматический расчёт при загрузке
    window.onload = calculate;
</script>
</body>
</html>
