<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>FureZ Calculator</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            margin: 0;
            padding: 16px;
            max-width: 480px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            font-size: 2.2rem;
            margin: 50px 0 60px;
            color: #a5b4fc;
        }
        .btn {
            width: 100%;
            padding: 18px;
            margin: 12px 0;
            border: none;
            border-radius: 16px;
            font-size: 1.15rem;
            font-weight: 600;
            color: white;
        }
        .btn-blue   { background: linear-gradient(135deg, #3b82f6, #1e40af); }
        .btn-yellow { background: linear-gradient(135deg, #fbbf24, #d97706); }
        .btn-red    { background: linear-gradient(135deg, #ef4444, #b91c1c); }
        .btn-green  { background: linear-gradient(135deg, #24a484, #24a484); }
    </style>
</head>
<body>

    <h1>FureZ<br>Calculator</h1>
    
    <button class="btn btn-blue" onclick="window.location.href='novice.html'">Поток Новичка</button>
    <button class="btn btn-yellow" onclick="window.location.href='fast.html'">Быстрый Поток</button>
    <button class="btn btn-red" onclick="window.location.href='starter.html'">Стартовый Поток</button>
    <button class="btn btn-green" onclick="window.location.href='growing.html'">Растущий Поток</button>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
</script>
</body>
</html>
