<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Поток Новичка - FureZ Calculator</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary: #3b82f6;
            --card-bg: #1e2937;
            --input-bg: #334155;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            margin: 0;
            padding: 16px;
            max-width: 480px;
            margin: 0 auto;
        }

        h2 {
            text-align: center;
            margin: 8px 0 24px;
            font-size: 1.65rem;
            color: #c4d0ff;
        }

        .back-btn {
            background: #475569;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            margin-bottom: 20px;
            width: 100%;
        }

        .card {
            background: var(--card-bg);
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .deposit-label {
            display: block;
            margin-bottom: 10px;
            color: #94a3b8;
            font-size: 0.98rem;
        }

        .deposit-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .deposit-input {
            flex: 1;
            padding: 16px;
            background: var(--input-bg);
            border: 2px solid #3b82f6;
            border-radius: 14px;
            color: white;
            font-size: 1.25rem;
            text-align: center;
            box-sizing: border-box;
        }

        .deposit-input:focus {
            border-color: #60a5fa;
        }

        .currency-select {
            padding: 16px 12px;
            background: var(--input-bg);
            border: 2px solid #3b82f6;
            border-radius: 14px;
            color: white;
            font-size: 1.05rem;
            min-width: 88px;           /* уменьшил, чтобы точно влезало */
            max-width: 100px;
        }

        .note {
            font-size: 0.87rem;
            color: #64748b;
            margin-top: 10px;
            text-align: left;           /* выровнял по левому краю как раньше */
        }

        .error {
            color: #f87171;
            font-size: 0.92rem;
            margin-top: 8px;
            text-align: center;
            display: none;
        }

        .info {
            background: var(--card-bg);
            padding: 16px;
            border-radius: 14px;
            margin-bottom: 20px;
            font-size: 1rem;
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card-bg);
            font-size: 14.2px;
            border-radius: 12px;
            overflow: hidden;
            margin-top: 8px;
        }

        th, td {
            padding: 12px 8px;
            text-align: center;
            border-bottom: 1px solid #475569;
        }

        th {
            background: #334155;
            color: #c4d0ff;
            font-weight: 600;
        }

        /* Чередующиеся строки */
        tbody tr:nth-child(even) {
            background-color: #252f3f;
        }

        .nach { color: #34d399; font-weight: bold; }
        .koshelek { color: #60a5fa; font-weight: bold; }
        .vpotoke { color: #fbbf24; font-weight: bold; }

        .deposit-input::-webkit-outer-spin-button,
        .deposit-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body>

    <button class="back-btn" onclick="window.location.href='index.html'">← Назад на главный экран</button>
    <h2>Поток Новичка (ПН)</h2>

    <div class="card">
        <label class="deposit-label">Депозит</label>
        <div class="deposit-row">
            <input type="number" id="deposit" class="deposit-input" value="100000"
                   oninput="validateAndCalculate()">
            <select id="currency" class="currency-select" onchange="validateAndCalculate()">
                <option value="RUB">RUB</option>
                <option value="USDT">USDT</option>
                <option value="EUR">EURO</option>
                <option value="CNY">CNY</option>
            </select>
        </div>
        <div class="note" id="limitNote">* от 2 000 до 200 000 RUB</div>
        <div id="depositError" class="error"></div>
    </div>

    <div class="info">
        Начальная сумма в потоке = Депозит + 50%<br>
        <strong id="vPotokeInfo">150 000.00</strong>
    </div>

    <table>
        <thead>
            <tr>
                <th>Дата</th>
                <th>День</th>
                <th class="vpotoke">В потоке</th>
                <th class="nach">Начисление (2%)</th>
                <th class="koshelek">Кошелёк</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const limits = {
        RUB: { min: 2000,   max: 200000,  symbol: 'RUB' },
        USDT: { min: 20,    max: 2000,    symbol: 'USDT' },
        EUR:  { min: 20,    max: 2000,    symbol: 'EURO' },
        CNY:  { min: 160,   max: 16000,   symbol: 'CNY' }
    };

    function validateAndCalculate() {
        const depositInput = document.getElementById('deposit');
        const currencySelect = document.getElementById('currency');
        const errorDiv = document.getElementById('depositError');
        const noteDiv = document.getElementById('limitNote');

        const currency = currencySelect.value;
        const limit = limits[currency];
        let deposit = parseFloat(depositInput.value) || 0;

        noteDiv.textContent = `* от ${limit.min.toLocaleString('ru-RU')} до ${limit.max.toLocaleString('ru-RU')} ${limit.symbol}`;

        if (deposit < limit.min || deposit > limit.max) {
            errorDiv.style.display = 'block';
            errorDiv.textContent = `⚠ Сумма должна быть от ${limit.min.toLocaleString('ru-RU')} до ${limit.max.toLocaleString('ru-RU')} ${limit.symbol}`;
            return;
        } else {
            errorDiv.style.display = 'none';
        }

        calculateNovice(deposit);
    }

    function calculateNovice(deposit) {
        const percent = 0.02;
        const maxDays = 180;
        let vPotoke = deposit * 1.5;
        let koshelek = 0;
        let dayCount = 0;

        document.getElementById('vPotokeInfo').textContent = 
            vPotoke.toLocaleString('ru-RU', { minimumFractionDigits: 2 });

        let tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';

        let currentDate = new Date();

        while (dayCount < maxDays) {
            if (currentDate.getDay() === 0) {
                currentDate.setDate(currentDate.getDate() + 1);
                continue;
            }
            dayCount++;
            let nachislenie = vPotoke * percent;
            koshelek += nachislenie;
            vPotoke -= nachislenie;

            let dateStr = currentDate.toLocaleDateString('ru-RU', {
                day: '2-digit', month: '2-digit', year: 'numeric'
            });

            let row = document.createElement('tr');
            row.innerHTML = `
                <td>${dateStr}</td>
                <td>${dayCount}</td>
                <td class="vpotoke">${vPotoke.toFixed(2)}</td>
                <td class="nach">+${nachislenie.toFixed(2)}</td>
                <td class="koshelek">${koshelek.toFixed(2)}</td>
            `;
            tbody.appendChild(row);

            if (vPotoke < 0.01) break;
            currentDate.setDate(currentDate.getDate() + 1);
        }
    }

    window.onload = validateAndCalculate;
</script>
</body>
</html>
