<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const limits = {
        RUB: { min: 2000,   max: 200000,  symbol: '₽' },
        USDT: { min: 20,    max: 2000,    symbol: '₮' },
        EUR:  { min: 20,    max: 2000,    symbol: '€' },
        CNY:  { min: 160,   max: 16000,   symbol: '¥' }
    };

    function validateAndCalculate() {
        const depositInput = document.getElementById('deposit');
        const currencySelect = document.getElementById('currency');
        const errorDiv = document.getElementById('depositError');
        const noteDiv = document.getElementById('limitNote');
        const infoDiv = document.querySelector('.info');
        const table = document.querySelector('table');

        const currency = currencySelect.value;
        const limit = limits[currency];
        let deposit = parseFloat(depositInput.value) || 0;

        noteDiv.textContent = `* от ${limit.min.toLocaleString('ru-RU')} до ${limit.max.toLocaleString('ru-RU')} ${limit.symbol}`;

        // Скрываем таблицу и инфо при некорректном депозите
        if (deposit < limit.min || deposit > limit.max || deposit === 0) {
            errorDiv.style.display = 'block';
            errorDiv.textContent = `⚠ Сумма должна быть от ${limit.min.toLocaleString('ru-RU')} до ${limit.max.toLocaleString('ru-RU')} ${limit.symbol}`;
            infoDiv.style.display = 'none';
            table.style.display = 'none';
            return;
        } else {
            errorDiv.style.display = 'none';
            infoDiv.style.display = 'block';
            table.style.display = 'table';
        }

        calculateNovice(deposit);
    }

    function calculateNovice(deposit) {
        const percent = 0.02;
        const maxDays = 180;
        let initialVPotoke = deposit * 1.5;
        let vPotoke = initialVPotoke;
        let koshelek = 0;
        let dayCount = 0;

        document.getElementById('vPotokeInfo').textContent = 
            initialVPotoke.toLocaleString('ru-RU', { minimumFractionDigits: 2 });

        let tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';

        // Строка "ОТКРЫТИЕ"
        let firstAccrual = initialVPotoke * percent;
        let openRow = document.createElement('tr');
        openRow.classList.add('opening-row');
        openRow.innerHTML = `
            <td>ОТКРЫТИЕ</td>
            <td>-</td>
            <td class="vpotoke">${initialVPotoke.toFixed(2)}</td>
            <td class="nach">${firstAccrual.toFixed(2)}</td>
            <td class="koshelek">0.00</td>
        `;
        tbody.appendChild(openRow);

        let currentDate = new Date();

        while (dayCount < maxDays) {
            if (currentDate.getDay() === 0) {
                currentDate.setDate(currentDate.getDate() + 1);
                continue;
            }
            
            dayCount++;
            let nachislenie = vPotoke * percent;
            koshelek += nachislenie;
            vPotoke -= nachislenie;

            let dateStr = currentDate.toLocaleDateString('ru-RU', {
                day: '2-digit', month: '2-digit', year: 'numeric'
            });

            let row = document.createElement('tr');
            row.innerHTML = `
                <td>${dateStr}</td>
                <td>${dayCount}</td>
                <td class="vpotoke">${vPotoke.toFixed(2)}</td>
                <td class="nach">${(vPotoke * percent).toFixed(2)}</td>
                <td class="koshelek">${koshelek.toFixed(2)}</td>
            `;
            tbody.appendChild(row);

            if (vPotoke < 0.01) break;
            currentDate.setDate(currentDate.getDate() + 1);
        }
    }

    // Изначально скрываем таблицу и инфо
    window.onload = () => {
        document.querySelector('.info').style.display = 'none';
        document.querySelector('table').style.display = 'none';
        validateAndCalculate();
    };
</script>
